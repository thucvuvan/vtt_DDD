# docker network create vtt-shared-net
networks:
  vtt-net:
    external: true
    name: vtt-shared-net
services:
  mysql:
    image: mysql:8.4
    hostname: mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Ho_Chi_Minh
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pre_event}
    volumes:
      - "E:/Data/Docker/vtt_volume:/var/lib/mysql"
    networks:
      - vtt-net
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "sh", "-c", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

  redis:
    image: redis:7-alpine
    hostname: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - vtt-net
    ports:
      - "${REDIS_PORT:-6379}:6379"

  orderapi:
    image: orderapi
    hostname: orderapi
    restart: unless-stopped
    cpus: "2.0"
    mem_limit: 1g
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      TZ: Asia/Ho_Chi_Minh
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Server=mysql;Port=3306;Database=${MYSQL_DATABASE:-pre_event};User Id=root;Password=${MYSQL_ROOT_PASSWORD:-changeme};SslMode=None;"
      ConnectionStrings__Redis: "redis:6379,abortConnect=false,connectTimeout=2000"
    #volumes:
    #- E:/Source Code/vtt_DDD/Api/OrderApi/appsettings.json:/app/appsettings.json
    #- E:/Source Code/vtt_DDD/Api/OrderApi/app.config:/app/OrderApi.dll.config
    ports:
      - "8888:8080"
    networks:
     - vtt-net

